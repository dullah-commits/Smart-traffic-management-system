name: Deploy Traffic System
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Zip and Upload to S3
        run: |
          zip -r deploy_package.zip . -x "*.git*"
          aws s3 cp deploy_package.zip s3://lahore-traffic-system-abdullah/deploy_package.zip

      - name: Create CodeDeploy Deployment
        run: |
          aws deploy create-deployment \
            --application-name TrafficApp \
            --deployment-group-name TrafficFleet \
            --s3-location bucket=YOUR_BUCKET_NAME,bundleType=zip,key=deploy_package.zip
